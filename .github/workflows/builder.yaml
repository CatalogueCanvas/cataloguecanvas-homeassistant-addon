name: Builder

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    paths:
      - "cataloguecanvas/**"
      - "cataloguecanvas_test/**"
      - ".github/workflows/builder.yaml"
    tags:
      - "cataloguecanvas_test@*"
  pull_request:
    branches:
      - main
    paths:
      - "cataloguecanvas/**"
      - "cataloguecanvas_test/**"
      - ".github/workflows/builder.yaml"
  repository_dispatch:
    types: [cc-release]
  workflow_dispatch:
    inputs:
      addon:
        description: "Add-on to build"
        required: false
        default: all
        type: choice
        options:
          - all
          - cataloguecanvas
          - cataloguecanvas_test

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.addon }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon:
          - cataloguecanvas
          - cataloguecanvas_test
        arch:
          - amd64
          - aarch64
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      # Build only the relevant add-on for manual dispatch (dropdown) or a
      # cataloguecanvas_test@* tag push; otherwise build every matrix add-on.
      - name: Decide whether to build ${{ matrix.addon }}
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
             && [ "${{ inputs.addon }}" != "all" ] \
             && [ "${{ inputs.addon }}" != "${{ matrix.addon }}" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ startsWith(github.ref, 'refs/tags/cataloguecanvas_test@') }}" = "true" ] \
             && [ "${{ matrix.addon }}" != "cataloguecanvas_test" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read add-on metadata
        id: meta
        if: steps.gate.outputs.build == 'true'
        run: |
          VERSION=$(yq -r '.version' "${{ matrix.addon }}/config.yaml")
          IMAGE=$(yq -r '.image' "${{ matrix.addon }}/config.yaml" | sed 's/{arch}/${{ matrix.arch }}/g')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.addon }} (${{ matrix.arch }})
        if: steps.gate.outputs.build == 'true'
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          context: ${{ matrix.addon }}
          image: ${{ steps.meta.outputs.image }}
          image-tags: |
            ${{ steps.meta.outputs.version }}
            latest
          version: ${{ steps.meta.outputs.version }}
          build-args: |
            BUILD_FROM=ghcr.io/cataloguecanvas/cataloguecanvas:latest
          cosign: "false"
          push: ${{ github.event_name != 'pull_request' }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
